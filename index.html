<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAF Parts Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f12;
    --surface: #13161b;
    --surface2: #1a1e25;
    --border: #2a2f3a;
    --daf-orange: #f4a11d;
    --daf-orange-dim: rgba(244,161,29,0.12);
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;
    --row-hover: rgba(244,161,29,0.05);
    --radius: 6px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; }
  .logo-block { display: flex; align-items: center; gap: 14px; }
  .logo-badge { background: var(--daf-orange); color: #000; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.4rem; letter-spacing: 1px; padding: 4px 12px; clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%); }
  .logo-subtitle { font-family: 'Barlow Condensed', sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); }
  .parts-count { font-size: 0.78rem; letter-spacing: 1px; color: var(--text-muted); text-transform: uppercase; }
  .parts-count span { color: var(--daf-orange); font-weight: 500; }

  .hero-strip { background: linear-gradient(90deg, var(--daf-orange-dim) 0%, transparent 60%); border-bottom: 1px solid var(--border); padding: 1.4rem 2rem; display: flex; align-items: flex-end; gap: 2rem; }
  .hero-title { font-family: 'Barlow Condensed', sans-serif; font-size: 2.4rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; line-height: 1; color: var(--text); }
  .hero-title em { color: var(--daf-orange); font-style: normal; }
  .hero-desc { font-size: 0.82rem; color: var(--text-muted); letter-spacing: 0.5px; padding-bottom: 3px; }

  .toolbar { padding: 1.2rem 2rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; background: var(--surface); border-bottom: 1px solid var(--border); }
  .search-wrapper { position: relative; flex: 1; min-width: 260px; max-width: 480px; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
  .search-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'Barlow', sans-serif; font-size: 0.9rem; padding: 9px 14px 9px 40px; }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--daf-orange); box-shadow: 0 0 0 3px rgba(244,161,29,0.1); }
  .filter-select { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-dim); font-family: 'Barlow', sans-serif; font-size: 0.85rem; padding: 9px 12px; }
  .filter-select:focus { border-color: var(--daf-orange); }
  .results-label { margin-left: auto; font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; }
  .results-label strong { color: var(--daf-orange); }

  .table-container { padding: 1.5rem 2rem 3rem; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  thead th { font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); padding: 10px 14px; text-align: left; }
  thead th:hover { color: var(--daf-orange); }
  thead th .sort-arrow { display: inline-block; margin-left: 4px; opacity: 0.4; font-size: 0.65rem; }
  thead th.active { color: var(--daf-orange); }
  thead th.active .sort-arrow { opacity: 1; }
  tbody tr { border-bottom: 1px solid rgba(42,47,58,0.5); transition: background 0.12s; }
  tbody tr:hover { background: var(--row-hover); }
  tbody td { padding: 11px 14px; color: var(--text-dim); vertical-align: middle; }
  .td-article { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 0.95rem; color: var(--daf-orange) !important; letter-spacing: 0.5px; white-space: nowrap; }
  .td-name { color: var(--text) !important; font-weight: 400; min-width: 180px; }
  .td-spec { font-size: 0.78rem; color: var(--text-muted) !important; max-width: 260px; }
  .td-tnved, .td-ntin { font-family: 'Barlow Condensed', sans-serif; font-size: 0.88rem; letter-spacing: 0.5px; }
  .country-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 0.78rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; white-space: nowrap; }
  .brand-badge { display: inline-block; font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; padding: 3px 10px; border-radius: 2px; }

  /* Brand colors */
  .brand-DAF       { background: rgba(244,161,29,0.18); color: #f4a11d; border: 1px solid rgba(244,161,29,0.35); clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%); }
  .brand-TRP       { background: rgba(30,120,255,0.15); color: #5599ff; border: 1px solid rgba(30,120,255,0.3); clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%); }
  .brand-PACCAR    { background: rgba(0,190,140,0.15); color: #00c896; border: 1px solid rgba(0,190,140,0.3); clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%); }
  .brand-other     { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

  .no-results { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
  .no-results .nr-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.3; }
  .no-results p { font-size: 0.9rem; letter-spacing: 0.5px; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a4050; }

  @media (max-width: 768px) {
    .hero-strip { padding: 1rem; }
    .hero-title { font-size: 1.6rem; }
    .toolbar, .table-container { padding: 1rem; }
    header { padding: 0 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-block">
    <div class="logo-badge">DAF</div>
    <div class="logo-subtitle">Spare Parts Catalog</div>
  </div>
  <div class="parts-count">Позиций: <span id="total-count">0</span></div>
</header>

<div class="hero-strip">
  <div>
    <div class="hero-title">Каталог <em>запасных частей</em></div>
  </div>
  <div class="hero-desc"> </div>
</div>

<div class="toolbar">
  <div class="search-wrapper">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" class="search-input" id="searchInput" placeholder="Поиск по артикулу, наименованию, коду ТН ВЭД...">
  </div>
  <select class="filter-select" id="brandFilter">
    <option value="">Все марки</option>
    <option value="DAF">DAF</option>
    <option value="TRP">TRP</option>
    <option value="PACCAR">PACCAR</option>
    <option value="Eberspaecher">Eberspaecher</option>
    <option value="HELLA">HELLA</option>
    <option value="MANN-FILTER">MANN-FILTER</option>
    <option value="JOST">JOST</option>
    <option value="ZF">ZF</option>
    <option value="Webasto">Webasto</option>
  </select>
  <select class="filter-select" id="countryFilter">
    <option value="">Все страны</option>
  </select>
  <div class="results-label">Найдено: <strong id="result-count">0</strong> позиций</div>
</div>

<div class="table-container">
  <table id="partsTable">
    <thead>
      <tr>
        <th onclick="sortTable(0)" data-col="0">Артикул <span class="sort-arrow">↕</span></th>
        <th onclick="sortTable(1)" data-col="1">Наименование <span class="sort-arrow">↕</span></th>
        <th onclick="sortTable(2)" data-col="2">Характеристики <span class="sort-arrow">↕</span></th>
        <th onclick="sortTable(3)" data-col="3">Код ТН ВЭД <span class="sort-arrow">↕</span></th>
        <th onclick="sortTable(4)" data-col="4">Код NTIN <span class="sort-arrow">↕</span></th>
        <th onclick="sortTable(5)" data-col="5">Страна <span class="sort-arrow">↕</span></th>
        <th onclick="sortTable(6)" data-col="6">Марка <span class="sort-arrow">↕</span></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="no-results" id="noResults" style="display:none;">
    <div class="nr-icon">🔍</div>
    <p>Ничего не найдено по вашему запросу</p>
  </div>
</div>

<script>
const partsData = [
  {article:`2115828`,name:`Ремонтный набор реактивной тяги`,spec:`Ремонтный набор реактивной тяги — это комплект деталей,о`},
  {article:`2314588`,name:`датчик износа тормозной колодки`,spec:`Электронный датчик - износа тормозной колодки — это устро`},
  {article:`2336129`,name:`Клемма аккумулятора (перемычка) с электронным блоком контроля заряда.`,spec:`Клемма аккумулятора`},
];

function renderTable() {
  const tableBody = document.getElementById('tableBody');
  const resultCount = document.getElementById('result-count');
  const totalCount = document.getElementById('total-count');
  
  tableBody.innerHTML = '';
  resultCount.textContent = partsData.length;
  totalCount.textContent = partsData.length;
  
  partsData.forEach(part => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td class="td-article">${part.article}</td>
      <td class="td-name">${part.name}</td>
      <td class="td-spec">${part.spec}</td>
      <td class="td-tnved">${part.tnved || '-'}</td>
      <td class="td-ntin">${part.ntin || '-'}</td>
      <td><span class="country-badge">${part.country || '-'}</span></td>
      <td><span class="brand-badge brand-${part.brand || 'other'}">${part.brand || 'N/A'}</span></td>
    `;
    tableBody.appendChild(row);
  });
}

function sortTable(colIndex) {
  // Placeholder sorting function
  console.log('Sort by column:', colIndex);
}

// Initialize table on page load
document.addEventListener('DOMContentLoaded', renderTable);
</script>
</body>
</html>
