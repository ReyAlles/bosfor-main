<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAF Parts Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f12;
    --surface: #13161b;
    --surface2: #1a1e25;
    --border: #2a2f3a;
    --daf-orange: #f4a11d;
    --daf-orange-dim: rgba(244,161,29,0.12);
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;
    --row-hover: rgba(244,161,29,0.05);
    --radius: 6px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; }
  .logo-block { display: flex; align-items: center; gap: 14px; }
  .logo-badge { background: var(--daf-orange); color: #000; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.4rem; letter-spacing: 1px; padding: 4px 12px; clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%); }
  .logo-subtitle { font-family: 'Barlow Condensed', sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); }
  .parts-count { font-size: 0.78rem; letter-spacing: 1px; color: var(--text-muted); text-transform: uppercase; }
  .parts-count span { color: var(--daf-orange); font-weight: 500; }

  .hero-strip { background: linear-gradient(90deg, var(--daf-orange-dim) 0%, transparent 60%); border-bottom: 1px solid var(--border); padding: 1.4rem 2rem; display: flex; align-items: flex-end; gap: 2rem; }
  .hero-title { font-family: 'Barlow Condensed', sans-serif; font-size: 2.4rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; line-height: 1; color: var(--text); }
  .hero-title em { color: var(--daf-orange); font-style: normal; }
  .hero-desc { font-size: 0.82rem; color: var(--text-muted); letter-spacing: 0.5px; padding-bottom: 3px; }

  .toolbar { padding: 1.2rem 2rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; background: var(--surface); border-bottom: 1px solid var(--border); }
  .search-wrapper { position: relative; flex: 1; min-width: 260px; max-width: 480px; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
  .search-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'Barlow', sans-serif; font-size: 0.9rem; padding: 9px 14px 9px 40px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--daf-orange); box-shadow: 0 0 0 3px rgba(244,161,29,0.1); }
  .filter-select { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-dim); font-family: 'Barlow', sans-serif; font-size: 0.85rem; padding: 9px 14px; outline: none; cursor: pointer; transition: border-color 0.2s; }
  .filter-select:focus { border-color: var(--daf-orange); }
  .results-label { margin-left: auto; font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; }
  .results-label strong { color: var(--daf-orange); }

  .table-container { padding: 1.5rem 2rem 3rem; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  thead th { font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; transition: color 0.15s; }
  thead th:hover { color: var(--daf-orange); }
  thead th .sort-arrow { display: inline-block; margin-left: 4px; opacity: 0.4; font-size: 0.65rem; }
  thead th.active { color: var(--daf-orange); }
  thead th.active .sort-arrow { opacity: 1; }
  tbody tr { border-bottom: 1px solid rgba(42,47,58,0.5); transition: background 0.12s; }
  tbody tr:hover { background: var(--row-hover); }
  tbody td { padding: 11px 14px; color: var(--text-dim); vertical-align: middle; }
  .td-article { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 0.95rem; color: var(--daf-orange) !important; letter-spacing: 0.5px; white-space: nowrap; }
  .td-name { color: var(--text) !important; font-weight: 400; min-width: 180px; }
  .td-spec { font-size: 0.78rem; color: var(--text-muted) !important; max-width: 260px; }
  .td-tnved, .td-ntin { font-family: 'Barlow Condensed', sans-serif; font-size: 0.88rem; letter-spacing: 0.5px; }
  .country-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 0.78rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; white-space: nowrap; }
  .brand-badge { display: inline-block; font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; padding: 3px 10px; border-radius: 3px; white-space: nowrap; }

  /* Brand colors */
  .brand-DAF       { background: rgba(244,161,29,0.18); color: #f4a11d; border: 1px solid rgba(244,161,29,0.35); clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%); }
  .brand-TRP       { background: rgba(30,120,255,0.15); color: #5599ff; border: 1px solid rgba(30,120,255,0.3); clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%); }
  .brand-PACCAR    { background: rgba(0,190,140,0.15); color: #00c896; border: 1px solid rgba(0,190,140,0.3); clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%); }
  .brand-other     { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

  .no-results { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
  .no-results .nr-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.3; }
  .no-results p { font-size: 0.9rem; letter-spacing: 0.5px; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a4050; }

  @media (max-width: 768px) {
    .hero-strip { padding: 1rem; }
    .hero-title { font-size: 1.6rem; }
    .toolbar, .table-container { padding: 1rem; }
    header { padding: 0 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-block">
    <div class="logo-badge">DAF</div>
    <div class="logo-subtitle">Spare Parts Catalog</div>
  </div>
  <div class="parts-count">Позиций: <span id="total-count">0</span></div>
</header>

<div class="hero-strip">
  <div>
    <div class="hero-title">Каталог <em>запасных частей</em></div>
  </div>
  <div class="hero-desc"> </div>
</div>

<div class="toolbar">
  <div class="search-wrapper">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" class="search-input" id="searchInput" placeholder="Поиск по артикулу, наименованию, коду ТН ВЭД...">

  </select>
  <select class="filter-select" id="countryFilter">
    <option value="">Все страны</option>
  </select>
  <div class="results-label">Найдено: <strong id="result-count">0</strong> позиций</div>
</div>

<div class="table-container">
  <table id="partsTable">
    <thead>
      <tr>
        <th onclick="sortTable(0)" data-col="0">Артикул <span class="sort-arrow">↕</span></th>
        <th onclick="sortTable(1)" data-col="1">Наименование <span class="sort-arrow">↕</span></th>
        <th onclick="sortTable(2)" data-col="2">Характеристики <span class="sort-arrow">↕</span></th>
        <th onclick="sortTable(3)" data-col="3">Код ТН ВЭД <span class="sort-arrow">↕</span></th>
        <th onclick="sortTable(4)" data-col="4">Код NTIN <span class="sort-arrow">↕</span></th>
        <th onclick="sortTable(5)" data-col="5">Страна <span class="sort-arrow">↕</span></th>
        <th onclick="sortTable(6)" data-col="6">Марка <span class="sort-arrow">↕</span></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="no-results" id="noResults" style="display:none;">
    <div class="nr-icon">🔍</div>
    <p>Ничего не найдено по вашему запросу</p>
  </div>
</div>

  {article:`1536812`,name:`Комплект сцепления`,spec:`Комплект сцепления — это набор деталей, обеспечивающих передачу крутящего момента от двигателя к коробке передач и позволяющих временно разъединять их при переключении передач.  в  комплект сцепления входят три основных элемента: Диск сцепления (ведомый диск) — передаёт крутящий момент от маховика двигателя к коробке передач через фрикционные накладки.   Корзина сцепления (нажимной диск) — прижимает ведомый диск к маховику, создавая необходимое трение.   муфта выключения сцепления — обеспечивает плавное разъединение сцепления при нажатии на педаль.`,tnved:`8708939009`,ntin:`0200283933242`,country:`Китай`,brand:`TRP`},

  {article:`1781636`,name:`Втулка вилки выключения сцепления КПП`,spec:`Втулка вилки выключения сцепления КПП — это деталь, обеспечивающая плавное и точное движение вилки сцепления на её оси или штоке, снижая трение и износ.спользуется в коробках передач, Обеспечение вращения: Она позволяет валу вилки плавно поворачиваться внутри картера КПП при нажатии на педаль сцепления.Центровка и фиксация: Удерживает вал в строго определенном положении, исключая люфт и перекосы вилки. Снижение износа: Предотвращает прямой контакт «металл по металлу» между стальным валом и корпусом коробки передач, принимая на себя основную нагрузку трения. Если втулка изношена, вилка начинает «люфтить», что приводит к неполному выжиму сцепления, затрудненному переключению передач или посторонним шумам (скрип, скрежет) при работе педалью.`,tnved:`8708939009`,ntin:`0200285361357`,country:`Германия`,brand:`DAF`},

  {article:`1546143R`,name:`Комплект сцепления`,spec:`Комплект сцепления — это набор деталей, который используется в механизме сцепления автомобиля для передачи крутящего момента от двигателя к коробке передач и возможности временно разъединять эти два элемента при переключении передач.  В состав комплекта сцепления обычно входят:  Диск сцепления – главный элемент, который непосредственно передает крутящий момент с двигателя на коробку передач.  Корзина сцепления (или нажимной диск) – механизм, который прижимает диск сцепления к маховику двигателя.  Выжимной механизм – позволяет мягко разъединять диск сцепления и маховик при нажатии на педаль сцепления.`,tnved:`8708939009`,ntin:`0200285576881`,country:`Германия`,brand:`DAF`},

  {article:`2399185`,name:`Толкатель выпускного клапана двигателя`,spec:`Толкатель выпускного клапана двигателя — это элемент газораспределительного механизма (ГРМ), который передаёт усилие от кулачка распределительного вала к выпускному клапану, обеспечивая его открытие в нужный момент рабочего цикла двигателя. передаче движения от распределительного вала к клапану, обеспечивая его точное и синхронизированное открытие и закрытие для выпуска отработавших газов`,tnved:`8409990009`,ntin:`0200285847554`,country:`Германия`,brand:`DAF`},

  {article:`1243054`,name:`Болт фланцевый`,spec:`Болт фланцевый — это вид болта, у которого вместо обычной головки с шайбой имеется встроенный фланец (плоское расширение у основания головки). Этот фланец выполняет функцию шайбы: распределяет нагрузку на поверхность и предотвращает повреждение соединяемых деталей.`,tnved:`7318159008`,ntin:`0200297791333`,country:`Германия`,brand:`DAF`},

  {article:`1833059`,name:`Болт комбинированный с невыпадающей шайбой`,spec:`Болт комбинированный с невыпадающей шайбой — это крепёжное изделие, в котором шайба жёстко или частично фиксирована на болте и не может отсоединиться или потеряться при установке или демонтаже. Такое решение упрощает монтаж и предотвращает потерю шайбы.`,tnved:`7318159008`,ntin:`0200297799544`,country:`Нидерланды`,brand:`PACCAR`},
  {article:`1886076`,name:`отсечной клапан`,spec:`Отсечной клапан — это запорное устройство, предназначенное для полного перекрытия потока жидкости, газа или топлива в системе. Он работает по принципу «открыто/закрыто» и не регулирует, а прерывает подачу среды.`,tnved:`8481807900`,ntin:`0200307605742`,country:`Индия`,brand:`PACCAR`},

  {article:`1673078`,name:`Датчик давления и температуры масла/топлива`,spec:`Датчик давления и температуры масла/топлива — это комбинированное электронное устройство, которое одновременно измеряет: Давление (в системе смазки или подачи топлива), Температуру (масла или топлива), и передаёт эти данные в электронный блок управления (ЭБУ) двигателя или на приборную панель автомобиля.ИЗМЕРИТЕЛЬНО-КОНТРОЛЬНЫЙ ПРИБОР`,tnved:`9031809800`,ntin:`0200307606091`,country:`Мексика`,brand:`PACCAR`},
  {article:`2112272`,name:`Датчик температуры охлаждающей жидкости`,spec:`Датчик температуры охлаждающей жидкости (ДТОЖ) — это электронный сенсор, который измеряет температуру антифриза (охлаждающей жидкости) в системе охлаждения двигателя и передаёт эти данные в электронный блок управления (ЭБУ) и/или на приборную панель.`,tnved:`9025198009`,ntin:`0200287731271`,country:`Германия`,brand:`DAF`},
  {article:`2282208`,name:`Тормозной диск`,spec:`Тормозной диск — это ключевой элемент дисковой тормозной системы автомобиля, мотоцикла и других транспортных средств. Его основная задача — обеспечивать замедление и остановку колёс за счёт трения с тормозными колодками.`,tnved:`8708309109`,ntin:`0200297801575`,country:`Китай`,brand:`TRP`},
  {article:`1862603`,name:`Жгут проводов шасси контроля износа тормозных колодок`,spec:`Жгут проводов шасси контроля износа тормозных колодок — это: Электрическая проводка, входящая в состав общего жгута шасси, которая соединяет: датчики износа тормозных колодок (установлены на колодках или рядом с ними), с электронным блоком управления (ЭБУ) или приборной панелью.`,tnved:`8544300007`,ntin:`0200307606350`,country:`Польша`,brand:`DAF`},
  {article:`1935137`,name:`Поршневые кольца двигателя`,spec:`Поршневые кольца двигателя — это металлические кольца, которые устанавливаются в специальные канавки на поршне. Они играют критически важную роль в работе поршневого двигателя внутреннего сгорания.`,tnved:`8409990009`,ntin:`0200297807034`,country:`Нидерланды`,brand:`PACCAR`},
  {article:`1953296`,name:`Клапан регулировки давления топлива`,spec:`Клапан регулировки давления топлива — это устройство в системе питания двигателя, которое контролирует и поддерживает оптимальное давление топлива в рампе (топливной магистрали), подаваемого к форсункам.`,tnved:`8481101908`,ntin:`0200297807478`,country:`Германия`,brand:`DAF`},
  {article:`2383197`,name:`Поликлиновой ремень 8PK`,spec:`Поликлиновой ремень 8PK — это тип приводного ремня, который используется для передачи вращения от коленчатого вала на различные агрегаты двигателя: генератор, насос гидроусилителя, компрессор кондиционера и др.`,tnved:`4010390000`,ntin:`0200297808307`,country:`Испания`,brand:`PACCAR`},
  {article:`1948921`,name:`Фильтр масляный`,spec:`Фильтр масляный — это компонент двигателя, который очищает моторное масло от загрязнений: металлической стружки, копоти, остатков топлива и других примесей. Он играет важную роль в поддержании чистоты масла и, как следствие, долговечности двигателя.`,tnved:`8421230000`,ntin:`0200297809038`,country:`Германия`,brand:`PACCAR`},
  {article:`1953163`,name:`Термостат системы охлаждения`,spec:`Термостат системы охлаждения — это автоматический клапан, который регулирует циркуляцию охлаждающей жидкости (антифриза) в двигателе, в зависимости от его температуры.`,tnved:`8481805100`,ntin:`0200297809717`,country:`США`,brand:`PACCAR`},
  {article:`2129253`,name:`Фильтр масляный`,spec:`Фильтр масляный — это компонент двигателя, который очищает моторное масло от загрязнений: металлической стружки, копоти, остатков топлива и других примесей. Он играет важную роль в поддержании чистоты масла и, как следствие, долговечности двигателя.`,tnved:`8421230000`,ntin:`0200297820408`,country:`Франция`,brand:`PACCAR`},
  {article:`2345907`,name:`Клапан стояночного тормоза`,spec:`Клапан стояночного тормоза — это элемент пневматической тормозной системы, который управляет подачей воздуха к тормозным механизмам стояночного (ручного) тормоза, чаще всего на грузовых автомобилях, автобусах и спецтехнике. В легковых авто такой клапан не используется — там ручник работает механически.`,tnved:`8481209009`,ntin:`0200297820750`,country:`Индия`,brand:`DAF`},
  {article:`0229348`,name:`фильтр масляный ГУР`,spec:`Фильтр масляный ГУР (гидроусилителя рулевого управления) — это фильтрующий элемент, предназначенный для очистки рабочей жидкости (масла) в системе гидроусилителя руля. Он защищает насос ГУР, рейку и другие компоненты от износа из-за попадания грязи, стружки и частиц износа.`,tnved:`8421230000`,ntin:`0200297822747`,country:`Босния и Герцеговина`,brand:`PACCAR`},
  {article:`1812582`,name:`Диск тормозной задний`,spec:`Диск тормозной задний — это часть дисковой тормозной системы задней оси автомобиля. Он представляет собой металлический круглый диск, который вращается вместе с колесом, а при торможении зажимается тормозными колодками, создавая трение и замедляя движение автомобиля.`,tnved:`8708309109`,ntin:`0200297823324`,country:`Германия`,brand:`DAF`},
  {article:`2142288`,name:`Фильтр осушителя/влагоотделителя воздуха`,spec:`Фильтр осушителя/влагоотделителя воздуха — это сменный элемент (картридж), устанавливаемый в системе подготовки сжатого воздуха транспортных средств (особенно грузовиков, автобусов, спецтехники) с пневматическим оборудованием. Он предназначен для удаления влаги, масла и загрязнений из воздуха, подаваемого от компрессора в пневмосистему.`,tnved:`8421990006`,ntin:`0200307619022`,country:`Франция`,brand:`DAF`},
  {article:`1924315`,name:`Уплотнительное кольцо двигателя`,spec:`Уплотнительное кольцо двигателя резиновое`,tnved:`4016930005`,ntin:`0200287731547`,country:`Германия`,brand:`PACCAR`},
  {article:`2238797RN`,name:`Охладитель EGR`,spec:`Охладитель EGR (или радиатор EGR) — это компонент системы рециркуляции отработавших газов  предназначенный для охлаждения выхлопных газов, прежде чем они вернутся во впускной коллектор двигателя.`,tnved:`8708913509`,ntin:`0200307619329`,country:`Германия`,brand:`DAF`},
  {article:`1926047`,name:`Прокладка коллектора выпускного двигателя`,spec:`Прокладка выпускного коллектора — это уплотнительный элемент, устанавливаемый между головкой блока цилиндров и выпускным коллектором двигателя. Она предназначена для герметизации стыка, через который выходят отработанные газы из цилиндров в выхлопную систему.`,tnved:`8484100009`,ntin:`0200287732599`,country:`Германия`,brand:`PACCAR`},
  {article:`0384622`,name:`Втулка держателя обшивки двери`,spec:`Втулка держателя обшивки двери — это вспомогательный крепёжный элемент, который используется вместе с клипсами (фиксаторами) для надёжного крепления внутренней обшивки двери к металлическому каркасу.`,tnved:`3926909709`,ntin:`0200307620837`,country:`Нидерланды`,brand:`DAF`},
  {article:`1210468`,name:`Уплотнитель лобового стекла резиновый`,spec:`Уплотнитель лобового стекла резиновый`,tnved:`4016930005`,ntin:`0200287733169`,country:`Германия`,brand:`DAF`},
  {article:`1784586`,name:`Сигнал звуковой воздушный`,spec:`Сигнал звуковой воздушный — это тип автомобильного сигнала (клаксона), который издаёт звук с помощью сжатого воздуха, а не за счёт вибрации металлической диафрагмы, как в обычных электрических клаксонах.`,tnved:`8512309009`,ntin:`0200287733305`,country:`Чехия`,brand:`DAF`},
  {article:`2018995`,name:`Механизм открывания замка левой двери`,spec:`Механизм открывания замка левой двери — это совокупность деталей и тяг, обеспечивающих механическое или электрическое открывание двери с водительской стороны (левой передней). Он соединяет наружную и внутреннюю ручки двери с замком, обеспечивая его разблокировку и открытие.`,tnved:`8301600009`,ntin:`0200287739031`,country:`Нидерланды`,brand:`DAF`},

  {article:`2182094`,name:`Клапан регулировки расхода охлаждающей жидкости отопителя`,spec:`Клапан регулировки расхода охлаждающей жидкости отопителя — это устройство в системе отопления автомобиля, которое управляет подачей горячей охлаждающей жидкости (антифриза) в радиатор отопителя салона.`,tnved:`8481805100`,ntin:`0200287743106`,country:`Германия`,brand:`DAF`},
  {article:`1865030`,name:`Набор поршней двигателя`,spec:`Набор поршней двигателя — это комплект поршней, предназначенных для установки в двигатель внутреннего сгорания.`,tnved:`8409990009`,ntin:`0200287765269`,country:`Германия`,brand:`PACCAR`},

  {article:`1822165`,name:`Болт фланцевый`,spec:`Болт фланцевый — это болт, у которого под головкой вместо отдельной шайбы имеется широкое плоское основание (фланец). Он выполняет функцию как крепежа, так и прижимной поверхности.`,tnved:`7318159008`,ntin:`0200287801257`,country:`Нидерланды`,brand:`PACCAR`},

  {article:`2252092`,name:`Прокладка головки блока цилиндров двигателя`,spec:`Прокладка головки блока цилиндров двигателя металло-эластомерная (Основа: Многослойная нержавеющая сталь, Покрытие: Специальное эластомерное (резиноподобное) напыление в зонах уплотнения для компенсации микрорельефа поверхностей и обеспечения идеальной герметичности при высоких температурах и давлении)`,tnved:`8484100009`,ntin:`0200287808171`,country:`Германия`,brand:`PACCAR`},
  {article:`1533893`,name:`Топливный фильтр`,spec:`Топливный фильтр — это часть топливной системы автомобиля (или любого другого двигателя внутреннего сгорания), которая очищает топливо от загрязнений, ржавчины, пыли и других примесей перед тем, как оно попадёт в двигатель.`,tnved:`8421230000`,ntin:`0200287825963`,country:`Турция`,brand:`TRP`},

  {article:`2231929`,name:`Кран ручного тормоза`,spec:`Кран ручного тормоза — это механическое устройство, используемое для активации ручного тормоза (или стояночного тормоза) в автомобиле. Его основная функция — фиксировать автомобиль на месте и предотвращать его самопроизвольное движение, особенно при парковке.`,tnved:`8481209009`,ntin:`0200287831049`,country:`Венгрия`,brand:`DAF`},
  {article:`2262227`,name:`Гильза цилиндра двигателя`,spec:`Гильза цилиндра двигателя — это элемент двигателя, который представляет собой металлическую трубку, устанавливаемую в корпус блока цилиндров. Гильза служит для уплотнения камеры сгорания, а также для обеспечения точной работы поршня. Она является важной деталью в процессе работы двигателя внутреннего сгорания.`,tnved:`8409990009`,ntin:`0200287832893`,country:`Нидерланды`,brand:`PACCAR`},
  {article:`0661319`,name:`шариковый подшипник маховика`,spec:`Шариковый подшипник маховика — это элемент, который используется в двигателе внутреннего сгорания для обеспечения вращения маховика с минимальными потерями на трение и для увеличения срока службы системы. Он представляет собой подшипник, в котором используются шарики, расположенные между внутренним и наружным кольцами, обеспечивая плавное вращение и поддержку маховика.`,tnved:`8482109008`,ntin:`0200287842458`,country:`Польша`,brand:`DAF`},
  {article:`2188714`,name:`Переключатель передних фар`,spec:`Переключатель освещения — это элемент управления, который позволяет водителю регулировать включение и выключение освещения автомобиля, а также управлять его режимами (например, ближний и дальний свет, габаритные огни, противотуманные фары и т. д.).`,tnved:`8536501906`,ntin:`0200287852280`,country:`Румыния`,brand:`DAF`},
  {article:`2272927`,name:`Комплект топливных фильтров`,spec:`Комплект топливных фильтров — это набор фильтров, предназначенных для очистки топлива, которое поступает в двигатель автомобиля или другого транспортного средства. Комплект может включать различные типы фильтров, которые работают на разных стадиях топливной системы, обеспечивая очистку от загрязнителей, таких как частицы грязи, вода, ржавчина, а также поддерживают оптимальную работу двигателя.`,tnved:`8421230000`,ntin:`0200287865105`,country:`Австрия`,brand:`PACCAR`},
  {article:`1537109`,name:`Топливный фильтр`,spec:`Топливный фильтр — это компонент системы питания двигателя внутреннего сгорания, предназначенный для очистки топлива от загрязнений, таких как грязь, ржавчина, частицы воды и другие посторонние вещества. Он устанавливается в топливной системе между топливным баком и двигателем.  Основные функции топливного фильтра:  Очищение топлива: Топливный фильтр удаляет мелкие примеси, которые могут попасть в топливо при его заправке или из-за износа компонентов топливной системы.  Предотвращение повреждений: Загрязнения могут повредить топливный насос и инжекторы двигателя, а фильтр помогает избежать таких повреждений.  Обеспечение стабильной работы двигателя: Чистое топливо необходимое для нормальной работы двигателя, особенно в современных автомобилях, где точность дозировки топлива критична.`,tnved:`8421230000`,ntin:`0200287872882`,country:`Германия`,brand:`TRP`},
  {article:`2206300`,name:`Щетка стеклоочистителя`,spec:`Щётка стеклоочистителя — это та самая "дворник" на лобовом стекле автомобиля, которая удаляет воду, снег, грязь и прочий мусор, чтобы тебе было видно дорогу`,tnved:`9603500009`,ntin:`0200287873711`,country:`Германия`,brand:`DAF`},
  {article:`1425577`,name:`Заглушка бампера`,spec:`Заглушка бампера — это пластиковая деталь, устанавливаемая в пустые отверстия на бампере автомобиля чтобы защитить их от грязи, влаги и повреждений.`,tnved:`3926909709`,ntin:`0200287874374`,country:`Франция`,brand:`DAF`},
  {article:`1678488`,name:`Трубопровод впрыска топлива двигателя`,spec:`Трубка впрыска топлива — Подача топлива под экстремально высоким давлением непосредственно к форсунке.`,tnved:`8409990009`,ntin:`0200287874657`,country:`Германия`,brand:`PACCAR`},
  {article:`1734465`,name:`Датчик температуры охлаждающей жидкости ретардера`,spec:`Датчик температуры охлаждающей жидкости ретардера — это электронный сенсор, который измеряет температуру жидкости, охлаждающей ретардер (замедлитель движения) в грузовиках.`,tnved:`9025198009`,ntin:`0200287875067`,country:`Германия`,brand:`DAF`},
  {article:`2124563`,name:`Патрубок системы охлаждения`,spec:`Патрубок системы охлаждения`,tnved:`4009310000`,ntin:`0200307621964`,country:`Франция`,brand:`PACCAR`},
  {article:`1527757`,name:`Фильтр осушителя с маслоотделителем`,spec:`Фильтр осушителя с маслоотделителем — это элемент системы пневматической (воздушной) системы автомобиля, используемый для очистки и осушения воздуха, который подается в различные компоненты (например, тормозную систему или пневмоподвеску). Он состоит из двух основных частей: фильтра для очистки воздуха и маслоотделителя, который удаляет из воздуха масло, появляющееся при работе компрессора.`,tnved:`8421310000`,ntin:`0200287876033`,country:`Турция`,brand:`TRP`},
  {article:`1549392`,name:`Тормозной диск`,spec:`Тормозной диск — это один из ключевых элементов тормозной системы автомобиля, предназначенный для создания тормозного усилия при торможении. Он представляет собой металлический диск, который вращается вместе с колесом, а при применении тормозов подвергается сжатию между тормозными колодками, что приводит к замедлению движения автомобиля.`,tnved:`8708309109`,ntin:`0200287877030`,country:`Франция`,brand:`TRP`},
  {article:`1962266`,name:`Комплект тормозных колодок`,spec:`Комплект тормозных колодок — это набор деталей, предназначенных для замены изношенных или поврежденных тормозных колодок в автомобиле. Тормозные колодки — это элементы тормозной системы, которые прижимают тормозной диск или барабан, создавая трение, которое замедляет или останавливает движение транспортного средства.`,tnved:`8708309109`,ntin:`0200287877245`,country:`Китай`,brand:`TRP`},
  {article:`1962433`,name:`Комплект тормозных колодок`,spec:`Комплект тормозных колодок — это набор деталей, предназначенных для замены изношенных или поврежденных тормозных колодок в автомобиле. Тормозные колодки — это элементы тормозной системы, которые прижимают тормозной диск или барабан, создавая трение, которое замедляет или останавливает движение транспортного средства.`,tnved:`8708309109`,ntin:`0200288010610`,country:`Китай`,brand:`TRP`},

  {article:`1643512`,name:`Прокладка поддона двигателя`,spec:`Прокладка поддона двигателя резиновая — это уплотнительное  прокладка, которая устанавливается между поддоном двигателя и картером двигателя для предотвращения утечек масла. Поддон двигателя — это элемент, который закрывает нижнюю часть блока цилиндров и служит для сбора масла, циркулирующего по двигателю.`,tnved:`4016930005`,ntin:`0200288095471`,country:`Словения`,brand:`PACCAR`},

  {article:`1896990`,name:`Шайба регулировочная (проставка) вала КПП`,spec:`Шайба регулировочная (проставка) вала КПП — это элемент трансмиссии автомобиля, который используется для регулировки положения или зазора на валу коробки передач (КПП). Оно может служить как для установки нужного зазора между компонентами, так и для фиксации некоторых частей трансмиссии. Такое кольцо играет важную роль в обеспечении правильной работы коробки передач и долговечности её компонентов.`,tnved:`7318220008`,ntin:`0200288139151`,country:`Германия`,brand:`DAF`},
  {article:`1896992`,name:`Шайба регулировочная (проставка) вала КПП`,spec:`Шайба регулировочная (проставка) вала КПП — это элемент трансмиссии автомобиля, который используется для регулировки положения или зазора на валу коробки передач (КПП). Оно может служить как для установки нужного зазора между компонентами, так и для фиксации некоторых частей трансмиссии. Такое кольцо играет важную роль в обеспечении правильной работы коробки передач и долговечности её компонентов.`,tnved:`7318220008`,ntin:`0200288141659`,country:`Германия`,brand:`DAF`},

  {article:`1913171`,name:`Шайба регулировочная (проставка) вала КПП`,spec:`Шайба регулировочная (проставка) вала КПП — это элемент трансмиссии автомобиля, который используется для регулировки положения или зазора на валу коробки передач (КПП). Оно может служить как для установки нужного зазора между компонентами, так и для фиксации некоторых частей трансмиссии. Такое кольцо играет важную роль в обеспечении правильной работы коробки передач и долговечности её компонентов.`,tnved:`7318220008`,ntin:`0200288145930`,country:`Германия`,brand:`DAF`},

  {article:`2118530`,name:`Пневматический клапан (кнопка) блокировки/разблокировки руля`,spec:`Кнопка-клапан включения блокировки рулевой колонки — При нажатии на эту кнопку (обычно расположена на полу кабины или сбоку колонки) воздух подается в пневмоцилиндр, который освобождает фиксатор рулевой колонки, позволяя водителю настроить вылет и угол наклона руля.`,tnved:`8481209009`,ntin:`0200285192555`,country:`Франция`,brand:`DAF`},
  {article:`2295237`,name:`Задняя крышка дифференциала`,spec:`Задняя крышка дифференциала — это элемент конструкции заднего моста автомобиля, который закрывает корпус дифференциала сзади, обеспечивая герметичность и защиту внутренних компонентов (шестерен, масла и т.п.). Вот основные функции задней крышки дифференциала: Защита и герметичность — не даёт маслу вытекать и защищает внутренности от грязи и воды.`,tnved:`8708505509`,ntin:`0200288148160`,country:`Нидерланды`,brand:`DAF`},
  {article:`1655293`,name:`Пылезащитная крышка фары задняя большая`,spec:`Пылезащитная крышка фары задняя большая`,tnved:`8512909008`,ntin:`0200288149204`,country:`Италия`,brand:`DAF`},
  {article:`1694588`,name:`Насос ручной подкачки топлива`,spec:`Насос ручной подкачки топлива — это устройство, которое позволяет вручную прокачать топливо из бака в топливную систему двигателя, особенно при запуске после замены фильтра, ремонта, или при "завоздушивании" системы.`,tnved:`8413302008`,ntin:`0200288152532`,country:`Германия`,brand:`PACCAR`},
  {article:`1825427`,name:`Фильтр салона`,spec:`Фильтр салона (или фильтр воздуха салона) — это элемент системы вентиляции и кондиционирования автомобиля, который очищает воздух, поступающий в салон. Он фильтрует пыль, грязь, пыльцу, вредные вещества и запахи, а также помогает улучшить качество воздуха внутри автомобиля.`,tnved:`8421392008`,ntin:`0200307622770`,country:`Чехия`,brand:`DAF`},
  {article:`1917629`,name:`Поликлиновой ремень 9PK`,spec:`Поликлиновой ремень 9PK — это ремень привода с девятью ребрами (PK), который используется в автомобильных системах для передачи вращающего момента от коленчатого вала к различным механическим компонентам, таким как генератор, кондиционер, усилитель руля и другие устройства.`,tnved:`4010390000`,ntin:`0200288154000`,country:`Испания`,brand:`PACCAR`},
  {article:`2137593`,name:`Датчик давления воздуха перед турбиной`,spec:`Датчик давления воздуха перед турбиной — это устройство, которое измеряет давление воздуха, поступающего в турбину (или турбонаддув) перед тем, как воздух будет нагнетен в двигатель. Этот датчик важен для управления системой наддува и для обеспечения оптимальной работы турбокомпрессора.`,tnved:`9026208000`,ntin:`0200288154291`,country:`Франция`,brand:`DAF`},
  {article:`1661948`,name:`Поликлиновой ремень 9PK`,spec:`Поликлиновой ремень 9PK — это ремень привода с девятью ребрами (PK), который используется в автомобильных системах для передачи вращающего момента от коленчатого вала к различным механическим компонентам, таким как генератор, кондиционер, усилитель руля и другие устройства.`,tnved:`4010390000`,ntin:`0200288154598`,country:`Германия`,brand:`PACCAR`},
  {article:`2298831RN`,name:`Электронный блок управления, система управления двигателем`,spec:`Электронный блок управления двигателем (ЭБУ двигателя) — это центральный компьютер в автомобиле, который управляет работой двигателя и связанными с ним системами. ЭБУ анализирует данные, поступающие от различных датчиков (температуры, давления, положения дроссельной заслонки и другие) и на основе этой информации регулирует параметры работы двигателя, чтобы обеспечить оптимальную производительность, экономичность и экологичность.`,tnved:`9032890000`,ntin:`0200288155649`,country:`Польша`,brand:`DAF`},
  {article:`2411183`,name:`Ремонтный набор модуля вентялиции картера двигателя`,spec:`Ремонтный набор модуля вентиляции картера двигателя — это комплект деталей и компонентов, предназначенных для восстановления или замены элементов системы вентиляции картера. Система вентиляции картера (или PCV — Positive Crankcase Ventilation) играет важную роль в предотвращении накопления вредных газов в картере двигателя и поддерживает его нормальную работу.`,tnved:`8421990006`,ntin:`0200288160810`,country:`Франция`,brand:`PACCAR`},
  {article:`1651089`,name:`Направляющая шторки кабины`,spec:`Направляющая шторки кабины — это элемент, который используется для управления движением шторки в кабине транспортного средства, например, в грузовиках, автобусах или некоторых легковых автомобилях. Шторка в кабине может быть частью системы защиты от солнца, защиты от лишнего света или просто эстетической деталью для улучшения комфорта водителя и пассажиров.`,tnved:`3926909709`,ntin:`0200288161107`,country:`Португалия`,brand:`DAF`},
  {article:`1875551`,name:`Брызговик задний`,spec:`Брызговик задний — это защитная деталь, устанавливаемая в задней части автомобиля, предназначенная для защиты кузова и других частей автомобиля от грязи, воды, снега, а также для предотвращения разлета частиц, таких как камни или песок, которые могут повредить машину, а также загрязнить окружающую среду.`,tnved:`8708299009`,ntin:`0200285193804`,country:`Франция`,brand:`DAF`},
  {article:`1892247`,name:`Брызговик задний`,spec:`Брызговик задний — это защитная деталь, устанавливаемая в задней части автомобиля, предназначенная для защиты кузова и других частей автомобиля от грязи, воды, снега, а также для предотвращения разлета частиц, таких как камни или песок, которые могут повредить машину, а также загрязнить окружающую среду.`,tnved:`8708299009`,ntin:`0200285196355`,country:`Франция`,brand:`DAF`},

  {article:`1533863`,name:`Фильтр салона`,spec:`Фильтр салона (или салонный фильтр) — это устройство в системе вентиляции автомобиля, предназначенное для очистки воздуха, поступающего в салон. Он фильтрует пыль, грязь, пыльцу, а также запахи и вредные вещества, которые могут быть в воздухе. Это важная часть системы климат-контроля автомобиля, так как она помогает обеспечить комфорт и здоровье пассажиров, улучшая качество воздуха в салоне, особенно в условиях загрязнённого внешнего воздуха.`,tnved:`8421392008`,ntin:`0200307623586`,country:`Турция`,brand:`TRP`},
  {article:`0697905`,name:`Гайка фланца вала карданного`,spec:`Гайка фланца вала карданного — это крепежный элемент, используемый для фиксирования фланца на карданном валу автомобиля. Карданный вал — это важная часть трансмиссии, которая передает крутящий момент от коробки передач к ведущим колесам (например, в заднеприводных или полноприводных автомобилях).`,tnved:`7318163008`,ntin:`0200307624354`,country:`Тайвань`,brand:`DAF`},
  {article:`1270763`,name:`Прокладка масляной трубки турбины`,spec:`Прокладка масляной трубки турбины — это герметизирующее устройство, которое устанавливается между масляной трубкой и турбиной двигателя для предотвращения утечек масла. Масляная трубка обеспечивает подачу масла к турбине, что необходимо для смазки и охлаждения её подшипников, а также для работы системы турбонаддува.  Основные функции прокладки:  Герметизация соединения: Прокладка предотвращает утечку масла в местах соединения трубки и турбины, что важно для нормальной работы системы.  Поддержание давления: Она помогает поддерживать необходимое давление масла в трубке и турбине, чтобы система смазки функционировала эффективно.  Защита от загрязнений: Прокладка помогает изолировать масло от внешних загрязнителей и предотвращает попадание грязи или пыли в систему.`,tnved:`4016930005`,ntin:`0200288163798`,country:`Нидерланды`,brand:`PACCAR`},
  {article:`1664753`,name:`Уплотнительное кольцо топливного насоса`,spec:`Уплотнительное кольцо топливного насоса резиновое`,tnved:`4016930005`,ntin:`0200288165570`,country:`Великобритания`,brand:`PACCAR`},
  {article:`2146311`,name:`Набор поршневых колец двигателя`,spec:`Набор поршневых колец двигателя — это комплект металлических колец, которые устанавливаются в специальные канавки на поршне. Они обеспечивают герметичность камеры сгорания, контроль расхода масла и теплоотвод от поршня к цилиндру.`,tnved:`8409990009`,ntin:`0200288165815`,country:`Нидерланды`,brand:`PACCAR`},
  {article:`1548885`,name:`Топливный фильтр`,spec:`Топливный фильтр — это компонент системы питания двигателя внутреннего сгорания, предназначенный для очистки топлива от загрязнений, таких как грязь, ржавчина, частицы воды и другие посторонние вещества. Он устанавливается в топливной системе между топливным баком и двигателем.  Основные функции топливного фильтра:  Очищение топлива: Топливный фильтр удаляет мелкие примеси, которые могут попасть в топливо при его заправке или из-за износа компонентов топливной системы.  Предотвращение повреждений: Загрязнения могут повредить топливный насос и инжекторы двигателя, а фильтр помогает избежать таких повреждений.  Обеспечение стабильной работы двигателя: Чистое топливо необходимое для нормальной работы двигателя, особенно в современных автомобилях, где точность дозировки топлива критична.`,tnved:`8421230000`,ntin:`0200288168496`,country:`Германия`,brand:`MANN-FILTER`},
  {article:`2298832RN`,name:`Электронный блок управления двигателем`,spec:`Электронный блок управления двигателем (ЭБУ) — это ключевой компонент в современных автомобилях, который отвечает за управление работой двигателя внутреннего сгорания. Это микропроцессорная система, которая собирает данные от различных датчиков и на основе этих данных регулирует параметры работы двигателя, такие как подача топлива, зажигание, дозировка воздуха и многие другие параметры.`,tnved:`9032890000`,ntin:`0200288169189`,country:`Польша`,brand:`DAF`},
  {article:`1396606`,name:`Гайка ступицы`,spec:`Гайка ступицы — это специальная гайка, которая фиксирует ступицу колеса на оси или шпинделе   Объяснение простыми словами: Ступица — это часть, к которой крепится колесо. Она вращается вместе с колесом и содержит подшипники.  Гайка ступицы удерживает ступицу на месте, не давая ей соскочить с оси при вращении.`,tnved:`7318163008`,ntin:`0200288170765`,country:`Бразилия`,brand:`DAF`},
  {article:`1812563`,name:`Тормозной диск`,spec:`Тормозной диск — это металлический диск, который является частью дисковой тормозной системы автомобиля. Он крепится к ступице колеса и вращается вместе с ним.`,tnved:`8708309109`,ntin:`0200288171274`,country:`Германия`,brand:`DAF`},
  {article:`1913300`,name:`Четырехконтурный предохранительный клапан`,spec:`Четырёхконтурный предохранительный клапан — это важный элемент пневматической тормозной системы грузовых автомобилей, автобусов и прицепов. Он обеспечивает разделение и безопасность четырёх пневматических контуров, чтобы при выходе одного из них из строя — другие продолжали работать.`,tnved:`8481209009`,ntin:`0200288174619`,country:`Венгрия`,brand:`DAF`},
  {article:`2347247`,name:`Крышка ступицы`,spec:`Крышка ступицы — это защитный элемент, который закрывает центральную часть ступицы колеса, где находятся подшипники, гайка ступицы и другие важные элементы.`,tnved:`7326909409`,ntin:`0200288176057`,country:`Китай`,brand:`DAF`},
  {article:`1537148`,name:`Фильтр салона`,spec:`Фильтр салона (или салонный фильтр) — это устройство в системе вентиляции автомобиля, предназначенное для очистки воздуха, поступающего в салон. Он фильтрует пыль, грязь, пыльцу, а также запахи и вредные вещества, которые могут быть в воздухе. Это важная часть системы климат-контроля автомобиля, так как она помогает обеспечить комфорт и здоровье пассажиров, улучшая качество воздуха в салоне, особенно в условиях загрязнённого внешнего воздуха.`,tnved:`8421392008`,ntin:`0200307659530`,country:`Чехия`,brand:`TRP`},
  {article:`2134699RN`,name:`Стартер`,spec:`Стартер — это электрическое устройство, предназначенное для запуска двигателя автомобиля. Он обеспечивает поворот коленчатого вала двигателя, чтобы начать процесс сгорания топлива и запустить двигатель. Стартер обычно работает на электроэнергии, поступающей от аккумулятора, и состоит из нескольких основных частей: Электрический мотор — это основная часть стартера, которая вращает шестерню или маховик двигателя. Соленоид — это электромагнит, который отвечает за включение стартера и соединение его с маховиком двигателя. Шестерня (или обгонная муфта) — она соединяется с маховиком, чтобы передать вращательное движение на коленчатый вал. Щетки и якорь — они обеспечивают работу электрического мотора.`,tnved:`8511400008`,ntin:`0200288191029`,country:`Венгрия`,brand:`PACCAR`},
  {article:`1533833`,name:`Масляный фильтр`,spec:`Масляный фильтр — это устройство, предназначенное для очистки масла в двигателях внутреннего сгорания, гидравлических системах и других механизмах. Он удаляет загрязнения, такие как металлические частицы, сажа и продукты износа, продлевая срок службы масла и самого двигателя.`,tnved:`8421230000`,ntin:`0200288191333`,country:`Турция`,brand:`TRP`},
  {article:`1533834`,name:`Топливный фильтр`,spec:`Топливный фильтр — это устройство, предназначенное для очистки топлива от загрязнений, таких как ржавчина, пыль, вода и другие примеси. Он защищает топливную систему и двигатель от износа, обеспечивая стабильную работу и продлевая срок службы форсунок, насоса и других компонентов.`,tnved:`8421230000`,ntin:`0200288191593`,country:`Турция`,brand:`TRP`},

  {article:`1246306`,name:`Подшипник привода вентилятора вискомуфты`,spec:`Подшипник привода вентилятора вискомуфты - Подшипник радиальный шариковый, предназначен для обеспечения вращения привода вентилятора системы охлаждения двигателя грузовых автомобилей DAF CF/XF. Устанавливается в узле вискомуфты вентилятора, воспринимает радиальную нагрузку от крыльчатки вентилятора и обеспечивает плавное вращение вала привода. Представляет собой закрытый шариковый подшипник в сборе.`,tnved:`8482109008`,ntin:`0200288197953`,country:`Венгрия`,brand:`PACCAR`},

  {article:`2124041`,name:`Термостат охлаждающей жидкости`,spec:`Термостат охлаждающей жидкости это устройство, относительно небольшого размера (порядка 5 см в диаметре), устанавливаемое в систему охлаждения силового агрегата между двигателем и радиатором, для контроля ее работы. Основное назначение термостата – поддержание оптимальной температуры работы двигателя внутреннего сгорания.`,tnved:`8481805100`,ntin:`0200288347822`,country:`Франция`,brand:`PACCAR`},

];

const brandClass = b => {
  if (b === 'DAF') return 'brand-DAF';
  if (b === 'TRP') return 'brand-TRP';
  if (b === 'PACCAR') return 'brand-PACCAR';
  return 'brand-other';
};

const countryFlags = {
  'Германия':'🇩🇪','Нидерланды':'🇳🇱','Франция':'🇫🇷','Швеция':'🇸🇪',
  'Польша':'🇵🇱','Китай':'🇨🇳','Чехия':'🇨🇿','Венгрия':'🇭🇺',
  'Италия':'🇮🇹','Испания':'🇪🇸','Великобритания':'🇬🇧','США':'🇺🇸',
  'Румыния':'🇷🇴','Турция':'🇹🇷','Бельгия':'🇧🇪','Австрия':'🇦🇹'
};

// Populate country filter
const countries = [...new Set(partsData.map(p => p.country).filter(Boolean))].sort();
const cf = document.getElementById('countryFilter');
countries.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; cf.appendChild(o); });

document.getElementById('total-count').textContent = partsData.length;

let sortCol = -1, sortAsc = true;
let filteredData = [...partsData];

const PAGE_SIZE = 100;
let currentPage = 0;
let allFiltered = [...partsData];

function renderTable(data) {
  const tbody = document.getElementById('tableBody');
  const noResults = document.getElementById('noResults');
  document.getElementById('result-count').textContent = data.length;

  if (data.length === 0) {
    tbody.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  const slice = data.slice(0, (currentPage + 1) * PAGE_SIZE);
  tbody.innerHTML = slice.map(p => `
    <tr>
      <td class="td-article">${p.article}</td>
      <td class="td-name">${p.name}</td>
      <td class="td-spec">${p.spec}</td>
      <td class="td-tnved">${p.tnved}</td>
      <td class="td-ntin">${p.ntin}</td>
      <td><span class="country-badge">${countryFlags[p.country]||'🌍'} ${p.country}</span></td>
      <td><span class="brand-badge ${brandClass(p.brand)}">${p.brand}</span></td>
    </tr>
  `).join('');
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const brand = document.getElementById('brandFilter').value;
  const country = document.getElementById('countryFilter').value;

  allFiltered = partsData.filter(p => {
    const matchQ = !q || [p.article, p.name, p.spec, p.tnved, p.ntin].some(v => v.toLowerCase().includes(q));
    const matchBrand = !brand || p.brand === brand;
    const matchCountry = !country || p.country === country;
    return matchQ && matchBrand && matchCountry;
  });

  if (sortCol >= 0) {
    const key = ['article','name','spec','tnved','ntin','country','brand'][sortCol];
    allFiltered.sort((a,b) => sortAsc ? a[key].localeCompare(b[key]) : b[key].localeCompare(a[key]));
  }
  currentPage = 0;
  renderTable(allFiltered);
}

function sortTable(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  document.querySelectorAll('thead th').forEach((th, i) => {
    th.classList.toggle('active', i === col);
    th.querySelector('.sort-arrow').textContent = i === col ? (sortAsc ? '↑' : '↓') : '↕';
  });
  applyFilters();
}

// Infinite scroll
window.addEventListener('scroll', () => {
  if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 300) {
    if ((currentPage + 1) * PAGE_SIZE < allFiltered.length) {
      currentPage++;
      renderTable(allFiltered);
    }
  }
});

document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('brandFilter').addEventListener('change', applyFilters);
document.getElementById('countryFilter').addEventListener('change', applyFilters);

applyFilters();
</script>
